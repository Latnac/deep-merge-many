name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release + tag
      id-token: write # npm Trusted Publishing (OIDC) — see publishing-nodejs-packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      # https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-to-the-npm-registry
      # (not GitHub Packages / npm.pkg.github.com — see PUBLISHING.md)
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build
      - name: Check version, npm registry, and git tag
        id: publish
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/check-npm-publish.mjs
      - name: Publish to npm
        if: steps.publish.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN: npm Trusted Publishing exchanges the GitHub OIDC token
      - name: Create GitHub tag and release
        if: steps.publish.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.publish.outputs.tag }}" \
            --title "${{ steps.publish.outputs.tag }}" \
            --generate-notes \
            --repo "${{ github.repository }}"
